<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline • Krešimir Fit</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: linear-gradient(160deg, #1b3255 0%, #0f1f38 100%);
        color: #fff;
      }
      .card {
        width: 100%;
        max-width: 420px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.16);
        padding: 20px;
        text-align: center;
      }
      .title {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .text {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.45;
      }
      .btn {
        margin-top: 16px;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #c85a10, #a84a0d);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Trenutno ste offline</div>
      <div class="text">
        Aplikacija radi djelomično bez interneta. Čim se veza vrati, podaci će
        se normalno sinkronizirati.
      </div>
      <button class="btn" onclick="location.reload()">Pokušaj ponovno</button>
    </div>
  </body>
</html>
